<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost at Sea | Fiji Bod</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(180deg, #00d4ff 0%, #0066cc 50%, #001a33 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }
        
        .ocean {
            font-size: 8rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 6rem;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        p {
            font-size: 1.5rem;
            margin: 1rem 0;
            max-width: 600px;
        }
        
        .message {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            margin: 2rem 0;
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            z-index: 1000;
            flex-wrap: wrap;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background 0.3s;
            font-weight: 600;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .island {
            position: absolute;
            bottom: 10%;
            font-size: 4rem;
            opacity: 0.5;
        }
        
        .island-1 { left: 10%; animation: drift 20s infinite; }
        .island-2 { right: 15%; animation: drift 25s infinite reverse; }
        
        @keyframes drift {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">🏠 Home</a>
        <a href="tracker.html">📊 Tracker</a>
        <a href="leaderboard.html">🏆 Leaderboard</a>
        <a href="challenge.html">⚔️ Challenges</a>
        <a href="motivation.html">🔥 Motivation</a>
    </nav>
    <div class="island island-1">🏝️</div>
    <div class="island island-2">🌴</div>
    
    <div class="ocean">🌊🧍🌊</div>
    
    <h1>404</h1>
    
    <div class="message">
        <p>You've drifted away from the main island...</p>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-top: 1rem;">
            This page doesn't exist. Maybe it never did.<br>
            Maybe you're just dehydrated from your workout.<br>
            Either way, let's get you back on track.
        </p>
    </div>
    
    
    <script>
        console.log('%c🌊 404 - LOST AT SEA 🌊', 'font-size: 25px; color: #00d4ff;');
        console.log('%cDon\'t worry, even the best navigators get lost sometimes.', 'font-size: 14px; color: #fff;');
    </script>
</body>
</html>
